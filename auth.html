<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroClick - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #313155 0%, #584CB5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2A2A2D;
        }

        .auth-container {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #584CB5;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: #999;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #584CB5;
            border-bottom-color: #584CB5;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #584CB5;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #584CB5;
            box-shadow: 0 0 0 3px rgba(88, 76, 181, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #584CB5;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #B31962;
        }

        .btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .alert.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .link a {
            color: #584CB5;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #584CB5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .auth-container {
                padding: 40px 25px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <a href="/" class="back-link">← Volver</a>
    
    <div class="logo">NeuroClick™</div>
    <p class="subtitle">Tu Inteligencia Amplificada</p>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
        <div class="tab" onclick="switchTab('signup')">Crear Cuenta</div>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="form-section active">
        <div id="loginAlert"></div>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn" id="loginBtn">Iniciar Sesión</button>
            <div class="loading" id="loginLoading">Verificando...</div>
        </form>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="form-section">
        <div id="signupAlert"></div>
        
        <form onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="signupName" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña (mín. 6 caracteres)</label>
                <input type="password" id="signupPassword" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="signupPassword2" placeholder="••••••••" minlength="6" required>
            </div>

            <button type="submit" class="btn" id="signupBtn">Crear Cuenta</button>
            <div class="loading" id="signupLoading">Creando cuenta...</div>
        </form>

        <p style="font-size: 12px; color: #999; margin-top: 20px; text-align: center;">
            Al crear cuenta, aceptas nuestros términos de servicio
        </p>
    </div>
</div>

<script>
// CONFIGURACIÓN DE SUPABASE PARA AUTENTICACIÓN
const SUPABASE_URL = 'https://eoceqdgeptdevudoniuk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvY2VxZGdlcHRkZXZ1ZG9uaXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTkyMDksImV4cCI6MjA5NTAzNTIwOX0.8qKGJfLzZUydzWuG-n78_8Rs9X1ZHkzBkhV98vtCdtM';

// OBJETO GLOBAL PARA MANEJAR AUTENTICACIÓN
const Auth = {
  currentUser: null,
  
  // SIGNUP - Crear nueva cuenta
  async signup(email, password, nombre) {
    try {
      const signupResponse = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      });

      if (!signupResponse.ok) {
        const error = await signupResponse.json();
        throw new Error(error.message || 'Error al crear cuenta');
      }

      const userData = await signupResponse.json();
      const userId = userData.user.id;

      const estudianteResponse = await fetch(`${SUPABASE_URL}/rest/v1/estudiantes`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          id: userId,
          email: email,
          nombre: nombre,
          tipo_programa: 'pendiente',
          estado: 'activo'
        })
      });

      if (!estudianteResponse.ok) {
        console.error('Error al guardar datos del estudiante');
      }

      return { success: true, userId: userId };

    } catch (error) {
      console.error('Error signup:', error);
      return { success: false, error: error.message };
    }
  },

  // LOGIN - Iniciar sesión
  async login(email, password) {
    try {
      const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      });

      if (!response.ok) {
        throw new Error('Email o contraseña incorrectos');
      }

      const data = await response.json();
      
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user_id', data.user.id);
      localStorage.setItem('user_email', data.user.email);

      this.currentUser = {
        id: data.user.id,
        email: data.user.email
      };

      return { success: true, user: this.currentUser };

    } catch (error) {
      console.error('Error login:', error);
      return { success: false, error: error.message };
    }
  },

  // LOGOUT - Cerrar sesión
  logout() {
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    localStorage.removeItem('user_id');
    localStorage.removeItem('user_email');
    this.currentUser = null;
    window.location.href = '/auth.html';
  },

  // VERIFICAR SESIÓN ACTUAL
  checkSession() {
    const token = localStorage.getItem('access_token');
    const userId = localStorage.getItem('user_id');
    const userEmail = localStorage.getItem('user_email');

    if (token && userId) {
      this.currentUser = {
        id: userId,
        email: userEmail
      };
      return true;
    }

    return false;
  },

  // OBTENER TOKEN ACTUAL
  getToken() {
    return localStorage.getItem('access_token');
  },

  // OBTENER ID DE USUARIO ACTUAL
  getUserId() {
    return localStorage.getItem('user_id');
  },

  // OBTENER EMAIL DE USUARIO ACTUAL
  getUserEmail() {
    return localStorage.getItem('user_email');
  }
};

// VERIFICAR SESIÓN AL CARGAR
window.addEventListener('DOMContentLoaded', () => {
  Auth.checkSession();
});
</script>

<script>
    function switchTab(tab) {
        // Cambiar tabs
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));

        // Agregar active al tab correcto
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((t, index) => {
            if ((tab === 'login' && index === 0) || (tab === 'signup' && index === 1)) {
                t.classList.add('active');
            }
        });

        document.getElementById(tab === 'login' ? 'loginForm' : 'signupForm').classList.add('active');
    }

    async function handleLogin(e) {
        e.preventDefault();

        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        const loading = document.getElementById('loginLoading');
        const alert = document.getElementById('loginAlert');

        btn.disabled = true;
        loading.style.display = 'block';
        alert.innerHTML = '';

        const result = await Auth.login(email, password);

        if (result.success) {
            alert.innerHTML = '<div class="alert success">✓ Bienvenido. Redirigiendo...</div>';
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 1500);
        } else {
            alert.innerHTML = `<div class="alert error">✗ ${result.error}</div>`;
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    async function handleSignup(e) {
        e.preventDefault();

        const nombre = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const password2 = document.getElementById('signupPassword2').value;
        const btn = document.getElementById('signupBtn');
        const loading = document.getElementById('signupLoading');
        const alert = document.getElementById('signupAlert');

        // Validar
        if (password !== password2) {
            alert.innerHTML = '<div class="alert error">Las contraseñas no coinciden</div>';
            return;
        }

        btn.disabled = true;
        loading.style.display = 'block';
        alert.innerHTML = '';

        const result = await Auth.signup(email, password, nombre);

        if (result.success) {
            alert.innerHTML = '<div class="alert success">✓ Cuenta creada. Iniciando sesión...</div>';
            setTimeout(() => {
                // Auto login
                Auth.login(email, password).then(loginResult => {
                    if (loginResult.success) {
                        window.location.href = '/dashboard.html';
                    }
                });
            }, 1500);
        } else {
            alert.innerHTML = `<div class="alert error">✗ ${result.error}</div>`;
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    // Si ya tiene sesión, redirigir a dashboard
    if (Auth.checkSession()) {
        window.location.href = '/dashboard.html';
    }
</script>

</body>
</html>
